<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PATH-Fit Learning Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* [KEEP YOUR EXISTING CSS HERE - I have omitted it for brevity, but use the CSS from our previous code] */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-image: linear-gradient(rgba(240, 249, 255, 0.1), rgba(240, 249, 255, 0.1)), url('new bckgrnd.jpg'); background-size: cover; min-height: 100vh; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 520px; }
        .card { background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { width: 100%; background-color: #0ea5e9; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; }
        #payment-view, #dashboard-view { display: none; }
        .qr-placeholder { max-width: 200px; display: block; margin: 10px auto; }
    </style>
</head>
<body>
    <div class="container">
        <div id="auth-view" class="card">
            <form id="auth-form" onsubmit="handleAuth(event)">
                <div id="extended-fields"><input type="text" id="reg-fname" placeholder="First Name" required><input type="text" id="reg-lname" placeholder="Last Name" required></div>
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="btn">Sign Up / Sign In</button>
            </form>
        </div>

        <div id="payment-view" class="card">
            <h2>Pay 250 PHP ($4.12 USD)</h2>
            <img src="gcash-qr.png" class="qr-placeholder">
            <button onclick="checkPayment()" class="btn">I Have Paid</button>
        </div>

        <div id="dashboard-view" class="card">
            <h2>Hello, <span id="student-name"></span>!</h2>
            <img src="pathfit-thumbnail.jpg" onclick="openPdf()" style="width:100%; cursor:pointer;">
        </div>
    </div>

    <script>
        // PASTE YOUR KEYS HERE
        const supabase = supabase.createClient('https://gzggusbqwngjdzweewfx.supabase.co/rest/v1/', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6Z2d1c2Jxd25namR6d2Vld2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTE2ODcsImV4cCI6MjA5NzYyNzY4N30.gsvwC0FJ2iRmU1XO5G8hxJLeD85Ajl2-TTZXBUgbBZk');

        async function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) {
                // If error, try signing in
                const { data: signinData, error: signinError } = await supabase.auth.signInWithPassword({ email, password });
                if (signinError) return alert(signinError.message);
                goToDashboard(signinData.user);
            } else {
                // Successfully signed up, go to payment
                document.getElementById('auth-view').style.display = 'none';
                document.getElementById('payment-view').style.display = 'block';
            }
        }

        function goToDashboard(user) {
            document.getElementById('auth-view').style.display = 'none';
            document.getElementById('payment-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';
            document.getElementById('student-name').innerText = document.getElementById('reg-fname').value || "Student";
        }

        function checkPayment() {
            alert("Verification in progress. Admin will unlock your access soon.");
        }
    </script>
</body>
</html>
